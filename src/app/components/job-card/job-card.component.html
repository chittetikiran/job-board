<section class="jobs">

  <h2>🔥 Featured Jobs</h2>

  <div class="job-container" *ngIf="jobs.length; else noJobs">

    <div class="job-card" *ngFor="let job of jobs">

      <h3>{{ job.title }}</h3>

      <p class="company">{{ job.company }}</p>

      <div class="details">
        <span>📍 {{ job.location }}</span>
        <span>💰 {{ job.salary }}</span>
        <span>🕒 {{ job.type }}</span>
      </div>

      <div class="skills">
        <span *ngFor="let skill of job.skills">
          {{ skill }}
        </span>
      </div>

      <button>View Details</button>

    </div>

  </div>

  <ng-template #noJobs>
    <p style="text-align: center; color: #666; margin-top: 20px;">
      No jobs available for this category right now. Try another category or search term.
    </p>
  </ng-template>

</section>
