<section class="auth-page">
  <h2>Login</h2>
  <p>Access saved jobs and personalized recommendations.</p>
  <p>Use username: <strong>admin</strong> and password: <strong>123456</strong></p>

  <form class="auth-form" (ngSubmit)="onLogin()">
    <input type="text" name="username" [(ngModel)]="username" placeholder="Username" required />
    <input type="password" name="password" [(ngModel)]="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <p *ngIf="message">{{ message }}</p>
</section>
